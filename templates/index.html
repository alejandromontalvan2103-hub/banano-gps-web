<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Monitoreo GPS del Banano en ASPROBO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background: #2e7d32;
      color: white;
      padding: 15px;
      text-align: center;
    }
    #map {
      height: 70vh;
      width: 100%;
    }
    .panel {
      padding: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Sistema GPS de Trazabilidad del Banano Orgánico</h1>
  </header>

  <div id="map"></div>

  <div class="panel">
    <h2>Estado del vehículo</h2>
    <p id="info">Esperando ubicación...</p>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
